<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Drich Bags - Luxury Bags, Shoes & Hair</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,Arial,sans-serif;background:#f8f8f8}
.header{background:linear-gradient(135deg,#667eea 0%,#764ba2 100%);color:#fff;padding:30px 20px;text-align:center}
.header h1{font-size:32px;margin-bottom:8px;font-weight:700}
.header p{font-size:14px;opacity:0.9}
.tabs{display:flex;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,0.1);position:sticky;top:0;z-index:10}
.tab{flex:1;padding:16px 10px;color:#666;text-align:center;cursor:pointer;border:none;background:#fff;font-weight:600;font-size:15px;border-bottom:3px solid transparent;transition:all 0.3s}
.tab.active{color:#ff6b6b;border-bottom:3px solid #ff6b6b}
.grid{display:none;padding:15px;grid-template-columns:repeat(2,1fr);gap:15px;max-width:800px;margin:0 auto}
.grid.active{display:grid}
.item{background:#fff;border-radius:14px;overflow:hidden;box-shadow:0 3px 12px rgba(0,0,0,0.08);position:relative}
.item img{width:100%;height:190px;object-fit:cover;background:#f0f0f0}
.info{padding:14px}
.name{font-size:15px;font-weight:600;color:#222;margin-bottom:6px;height:42px;overflow:hidden;line-height:1.4}
.price{color:#ff4757;font-size:20px;font-weight:bold;margin:10px 0}
.old-price{text-decoration:line-through;color:#999;font-size:13px;margin-left:6px}
.whatsapp{background:#25D366;color:#fff;border:none;padding:12px;border-radius:10px;width:100%;font-weight:bold;cursor:pointer;font-size:15px;margin-top:8px}
.whatsapp:active{background:#20ba5a;transform:scale(0.98)}
.badge{background:#ff6b6b;color:#fff;padding:4px 10px;border-radius:6px;font-size:12px;position:absolute;margin:10px;z-index:2;font-weight:600}
@media(max-width:400px){.grid{grid-template-columns:1fr}.item img{height:220px}}
</style>
</head>
<body>

<div class="header">
<h1>Drich Bags</h1>
<p>Luxury Bags, Shoes & Hair - Delivery Available</p>
</div>

<div class="tabs">
<button class="tab active" onclick="showTab('bags',event)">Bags</button>
<button class="tab" onclick="showTab('shoes',event)">Shoes</button>
<button class="tab" onclick="showTab('hair',event)">Hair</button>
</div>

<div id="bags" class="grid active">
<div class="item">
<span class="badge">NEW</span>
<img src="IMG-1001.jpg.WEBP" alt="Gucci style backpack">
<div class="info">
<div class="name">Gucci style backpack</div>
<div><span class="price">GHS 150</span></div>
<button class="whatsapp" onclick="order('Gucci style backpack - GHS 150')">Order on WhatsApp</button>
</div>
</div>

<div class="item">
<span class="badge">HOT</span>
<img src="IMG-1002.jpg.WEBP" alt="LV Crossbody bag">
<div class="info">
<div class="name">LV Crossbody bag</div>
<div><span class="price">GHS 170</span></div>
<button class="whatsapp" onclick="order('LV Crossbody bag - GHS 170')">Order on WhatsApp</button>
</div>
</div>
</div>

<div id="shoes" class="grid">
<div class="item">
<span class="badge">BESTSELLER</span>
<img src="IMG-2001.jpg.WEBP" alt="Nike Air Force">
<div class="info">
<div class="name">Nike Air Force</div>
<div><span class="price">GHS 180</span></div>
<button class="whatsapp" onclick="order('Nike Air Force - GHS 180')">Order on WhatsApp</button>
</div>
</div>

<div class="item">
<img src="IMG-2002.jpg.WEBP" alt="Black heel for ladies">
<div class="info">
<div class="name">Black heel for ladies</div>
<div><span class="price">GHS 130</span></div>
<button class="whatsapp" onclick="order('Black heel for ladies - GHS 130')">Order on WhatsApp</button>
</div>
</div>
</div>

<div id="hair" class="grid">
<div class="item">
<span class="badge">NEW</span>
<img src="IMG-3001.jpg.WEBP" alt="Bone straight">
<div class="info">
<div class="name">Bone straight</div>
<div><span class="price">GHS 400</span></div>
<button class="whatsapp" onclick="order('Bone straight - GHS 400')">Order on WhatsApp</button>
</div>
</div>

<div class="item">
<span class="badge">TRENDING</span>
<img src="IMG-3002.jpg.WEBP" alt="Wig with closure">
<div class="info">
<div class="name">Wig with closure</div>
<div><span class="price">GHS 350</span></div>
<button class="whatsapp" onclick="order('Wig with closure - GHS 350')">Order on WhatsApp</button>
</div>
</div>
</div>

<script>
function showTab(tab,event){
document.querySelectorAll('.grid').forEach(g=>g.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(tab).classList.add('active');
event.target.classList.add('active');
}
function order(product){
var phone = '233538605837';
var msg = 'Hello Drich Bags! I want to order: ' + product;
window.open('https://wa.me/' + phone + '?text=' + encodeURIComponent(msg));
}
</script>

</body>
</html>
