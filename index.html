<!DOCTYPE html>
<html>
<head>
<title>Drich Bags</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body{font-family:Arial;margin:0;background:#f5f5f5}
.header{background:#000;color:#fff;padding:20px;text-align:center}
.tabs{display:flex;background:#333}
.tab{flex:1;padding:15px;color:#fff;text-align:center;cursor:pointer;border:none;background:#333}
.tab.active{background:#ff6b6b}
.grid{display:none;padding:20px;grid-template-columns:repeat(2,1fr);gap:15px}
.grid.active{display:grid}
.item{background:#fff;padding:10px;border-radius:8px;text-align:center}
.item img{width:100%;height:150px;object-fit:cover;border-radius:5px}
.price{color:#ff6b6b;font-weight:bold;margin-top:5px}
</style>
</head>
<body>
<div class="header"><h1>Drich Bags</h1><p>Luxury Bags, Shoes & Hair</p></div>

<div class="tabs">
<button class="tab active" onclick="showTab('bags')">Bags</button>
<button class="tab" onclick="showTab('shoes')">Shoes</button>
<button class="tab" onclick="showTab('hair')">Hair</button>
</div>

<div id="bags" class="grid active">
<div class="item"><img src="IMG-1001.jpg.WEBP"><p>Bag 1</p><div class="price">₦15,000</div></div>
<div class="item"><img src="IMG-1002.jpg.WEBP"><p>Bag 2</p><div class="price">₦18,000</div></div>
</div>

<div id="shoes" class="grid">
<div class="item"><img src="IMG-2001.jpg.WEBP"><p>Shoe 1</p><div class="price">₦12,000</div></div>
<div class="item"><img src="IMG-2002.jpg.WEBP"><p>Shoe 2</p><div class="price">₦14,000</div></div>
</div>

<div id="hair" class="grid">
<div class="item"><img src="IMG-3001.jpg.WEBP"><p>Hair 1</p><div class="price">₦25,000</div></div>
<div class="item"><img src="IMG-3002.jpg.WEBP"><p>Hair 2</p><div class="price">₦30,000</div></div>
</div>

<script>
function showTab(tab){
document.querySelectorAll('.grid').forEach(g=>g.classList.remove('active'));
document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
document.getElementById(tab).classList.add('active');
event.target.classList.add('active');
}
</script>
</body>
</html>
